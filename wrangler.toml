# Cloudcore CMS - Cloudflare Workers Configuration
name = "cloudcore-cms"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Development settings
[dev]
port = 8787
local_protocol = "http"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "cloudcore-cms"
database_id = "local" # Add your D1 database ID here after running: npx wrangler d1 create cloudcore-cms
migrations_dir = "src/db/migrations"

# R2 Bucket for media storage
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "cloudcore-cms"
# Add preview_bucket_name for local development if needed

# Environment variables
[vars]
# ADMIN_TOKEN = "" # Optional: Set a static admin token for API access

# Production environment
[env.production]
# Add production-specific settings here

# Staging environment
[env.staging]
# Add staging-specific settings here
